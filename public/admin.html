<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adhikshana Admin Terminal</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body style="display: block; overflow-y: auto; padding: 4rem; background: #000;">
    <div id="toast-container"></div>
    <div class="timer-bar-container"><div id="timer-bar" class="timer-bar-fill"></div></div>

    <div id="admin-content" style="display: none; max-width: 1400px; margin: 0 auto;">
        <h1 style="color: var(--negative); font-family: 'JetBrains Mono', monospace; font-size: 2.5rem; letter-spacing: -1px; margin-bottom: 3rem;">⚠️ ADHIKSHANA | CRITICAL SYSTEM OVERRIDE</h1>
        
        <div class="surface" style="padding: 4rem; border-top: 8px solid var(--negative);">
            <h2 style="font-size: 1.5rem; margin-bottom: 2rem;">GLOBAL HARD RESET</h2>
            <p class="small-label" style="font-size: 1rem; margin-bottom: 3rem; color: var(--text-muted); line-height: 1.5;">This action will immediately terminate the current session and restore all parameters to Round 1 default values. This action is irreversible.</p>
            <button class="btn btn-red" onclick="resetGame()" style="padding: 1.5rem 4rem; font-size: 1.25rem;">INITIALIZE DESTRUCTIVE RESET</button>
        </div>

        <section class="surface" style="margin-top: 3rem; padding: 3rem;">
            <h2 style="font-size: 1.5rem;">DIRECT ENTITY ADJUSTMENT</h2>
            <div id="admin-team-list" class="grid" style="display:grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 1rem; margin-top: 2rem;"></div>
        </section>
    </div>

    <!-- Login Overlay -->
    <div id="login-overlay" style="position: fixed; inset: 0; background: var(--bg-main); z-index: 5000; display: flex; align-items: center; justify-content: center;">
        <div class="surface" style="width: 360px; text-align: center; padding: 3rem; border: 1px solid var(--negative);">
            <p class="small-label" style="margin-bottom: 1.5rem; color: var(--negative);">ELEVATED PRIVILEGES REQUIRED</p>
            <h1 style="font-size: 2rem; margin-bottom: 2rem;">ADMIN LOGON</h1>
            <input type="password" id="pass-input" placeholder="OVERRIDE_KEY" style="padding: 1rem; margin-bottom: 1.5rem; width: 100%; background: #000; border: 1px solid var(--border-subtle); color: white; text-align: center; border-radius: 4px;">
            <button id="login-btn" class="btn btn-red" style="width: 100%; padding: 1.25rem;">OVERRIDE HANDSHAKE</button>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        document.getElementById('login-btn').onclick = () => {
            const password = document.getElementById('pass-input').value;
            localStorage.setItem('sim_auth', JSON.stringify({ role: 'admin', password }));
            socket.send(JSON.stringify({ type: 'AUTH', role: 'admin', password }));
        };

        const resetGame = () => {
            if(confirm("⚠️ CRITICAL ALERT: You are about to wipe all data. Are you sure?")) {
                const check = prompt("Type 'CONFIRM RESET' to proceed:");
                if(check === 'CONFIRM RESET') {
                    socket.send(JSON.stringify({ type: 'ADMIN_ACTION', action: 'RESET' }));
                }
            }
        };

        const updateCash = (tId) => {
            const input = document.getElementById(`cash-input-${tId}`);
            if(!input) return;
            const val = input.value;
            socket.send(JSON.stringify({ type: 'ADMIN_ACTION', action: 'EDIT_CASH', payload: { teamId: tId, value: val } }));
        };

        updateUI = () => {
            const overlay = document.getElementById('login-overlay');
            if (role === 'admin' && gameState) {
                if (overlay) overlay.style.display = 'none';
                document.getElementById('admin-content').style.display = 'block';
            } else {
                if (overlay) overlay.style.display = 'flex';
                document.getElementById('admin-content').style.display = 'none';
                return;
            }

            try {
                const list = document.getElementById('admin-team-list');
                if (list) {
                    list.innerHTML = Object.values(gameState.teams).map(t => `
                        <div class="surface flex-row justify-between align-center" style="padding: 1rem; margin-bottom: 0;">
                            <div>
                                <p style="font-weight:700; font-family: 'JetBrains Mono', monospace; font-size: 1.2rem;">${t.id.toUpperCase()}</p>
                                <p class="small-label">CASH: ${t.cash.toFixed(2)} | LOCKED: ${t.lockedCash.toFixed(2)}</p>
                            </div>
                            <div class="flex-row align-center" style="gap: 1rem;">
                                <input type="number" id="cash-input-${t.id}" value="${t.cash.toFixed(2)}" step="0.5" style="width:70px; background:#000; border:1px solid var(--border-subtle); color:white; padding:8px; border-radius:4px;">
                                <button class="btn btn-red" style="padding: 8px 12px; font-size: 0.7rem;" onclick="updateCash('${t.id}')">SET</button>
                            </div>
                        </div>
                    `).join('');
                }
            } catch (err) { console.error("Admin UpdateUI Error:", err); }
        };
    </script>
</body>
</html>
